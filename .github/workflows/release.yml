name: Release

# Publishes to PyPI when a v* tag is pushed:
#
#     git tag v0.1.0 && git push origin v0.1.0
#
# Uses PyPI Trusted Publishing (OIDC) -- there is no API token to create or store. See
# RELEASING.md for the one-time PyPI setup.
#
# The extension is built as abi3 (>= 3.10), so we produce ONE wheel per platform/arch rather
# than one per Python version.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheels:
    name: wheel (${{ matrix.platform.os }}-${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: linux, runner: ubuntu-22.04, target: x86_64 }
          - { os: linux, runner: ubuntu-22.04, target: aarch64 }
          # Both macOS wheels are built on Apple Silicon; the Intel one is cross-compiled.
          # GitHub retired the Intel macOS runners, so a `macos-13` job simply sits in the
          # queue forever without ever being assigned a runner -- it does not fail, it hangs.
          - { os: macos, runner: macos-14, target: aarch64 }
          - { os: macos, runner: macos-14, target: x86_64 }
          - { os: windows, runner: windows-latest, target: x64 }

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10" # the abi3 floor

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: auto
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform.os }}-${{ matrix.platform.target }}
          path: dist

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  smoke-test:
    # Install the built wheel exactly as a user would, and check it actually translates --
    # a wheel that imports but mistranslates would otherwise sail straight to PyPI.
    name: smoke-test the built wheel
    needs: [wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12" # deliberately NOT the version it was built against

      - uses: actions/download-artifact@v4
        with:
          name: wheel-linux-x86_64
          path: dist

      - name: Install from the wheel and translate something
        run: |
          python -m pip install --find-links dist --no-index polars-seq
          python -m pip install polars biopython
          python - <<'PY'
          import polars as pl, polars_seq
          from Bio.Seq import Seq

          cases = ["ATGAAATTTTAA", "RAT", "SAA", "GGN", "TAR", "CTX", "atgaaa", "AUGAAA"]
          got = pl.DataFrame({"s": cases}).select(pl.col("s").seq.translate()).to_series().to_list()
          exp = [str(Seq(c).translate()) for c in cases]
          assert got == exp, f"wheel disagrees with BioPython: {got} != {exp}"

          # The X quirk must survive packaging too.
          try:
              pl.DataFrame({"s": ["XXX"]}).select(pl.col("s").seq.translate())
              raise AssertionError("XXX should have been rejected")
          except Exception:
              pass

          print("wheel OK:", dict(zip(cases, got)))
          PY

  publish:
    name: publish to PyPI
    needs: [wheels, sdist, smoke-test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    environment:
      name: pypi
      url: https://pypi.org/p/polars-seq

    permissions:
      id-token: write # required for Trusted Publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List what we are about to publish
        run: ls -la dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
